name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required to create a GitHub Release

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p kerios --target ${{ matrix.target }}

      - name: Package archive
        id: pkg
        run: |
          NAME="kerios-${{ github.ref_name }}-${{ matrix.target }}"
          STAGE="dist/$NAME"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/kerios" "$STAGE/"
          cp README.md LICENSE CHANGELOG.md "$STAGE/"
          tar -czf "dist/$NAME.tar.gz" -C dist "$NAME"
          echo "archive=dist/$NAME.tar.gz" >> "$GITHUB_OUTPUT"
          (cd dist && shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256")

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kerios-${{ matrix.target }}
          path: |
            dist/kerios-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            dist/kerios-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pull the section whose header is the current tag (e.g. ## [0.1.0]).
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "see CHANGELOG.md" > release-notes.md
          fi
          {
            echo 'notes<<EOF'
            cat release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
